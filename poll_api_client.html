<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Poll API — Test Client</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --border: #262b38;
    --text: #e6e8ee;
    --muted: #8b93a7;
    --accent: #5b8def;
    --accent-dim: #2c4a7c;
    --good: #4cb782;
    --bad: #e25c5c;
    --mono: "SF Mono", "Cascadia Code", Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 2rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 {
    font-size: 1.4rem;
    letter-spacing: 0.02em;
    margin-bottom: 0.2rem;
  }
  .sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 2rem;
  }
  .grid {
    width: 100%;
    max-width: 920px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }
  @media (max-width: 700px) {
    .grid { grid-template-columns: 1fr; }
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem;
  }
  .panel.wide { grid-column: 1 / -1; }
  .panel h2 {
    font-size: 0.95rem;
    margin: 0 0 1rem 0;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .panel h2 .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-dim);
    display: inline-block;
  }
  label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin: 0.6rem 0 0.25rem;
  }
  input, textarea {
    width: 100%;
    background: #0c0e13;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.5rem 0.6rem;
    border-radius: 6px;
    font-size: 0.85rem;
    font-family: inherit;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--accent);
  }
  .choice-row { display: flex; gap: 0.4rem; margin-top: 0.4rem; }
  .choice-row input { flex: 1; }
  .choice-row button { flex-shrink: 0; }
  button {
    background: var(--accent-dim);
    color: var(--text);
    border: 1px solid var(--accent);
    border-radius: 6px;
    padding: 0.5rem 0.8rem;
    font-size: 0.8rem;
    cursor: pointer;
    margin-top: 0.8rem;
  }
  button:hover { background: var(--accent); }
  button.ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
  }
  button.ghost:hover { border-color: var(--muted); color: var(--text); }
  button.small { padding: 0.3rem 0.55rem; font-size: 0.72rem; margin-top: 0; }
  .row { display: flex; gap: 0.5rem; }
  .status {
    font-family: var(--mono);
    font-size: 0.72rem;
    white-space: pre-wrap;
    background: #0c0e13;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.6rem;
    margin-top: 0.7rem;
    max-height: 160px;
    overflow-y: auto;
    color: var(--muted);
  }
  .status.ok { border-color: var(--good); color: var(--good); }
  .status.err { border-color: var(--bad); color: var(--bad); }
  .session-bar {
    width: 100%;
    max-width: 920px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    margin-bottom: 1rem;
    font-size: 0.8rem;
  }
  .session-bar .user { color: var(--accent); }
  .poll-card {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.8rem;
    margin-top: 0.6rem;
  }
  .poll-card h3 { margin: 0 0 0.2rem 0; font-size: 0.95rem; }
  .poll-card .meta { color: var(--muted); font-size: 0.72rem; margin-bottom: 0.5rem; }
  .poll-card .closed-tag { color: var(--bad); }
  .choices-list { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-top: 0.4rem; }
  .choice-pill {
    border: 1px solid var(--border);
    border-radius: 5px;
    padding: 0.25rem 0.5rem;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .choice-pill:hover { border-color: var(--accent); }
  .results-bar-bg {
    background: #0c0e13;
    border-radius: 4px;
    height: 7px;
    width: 100%;
    overflow: hidden;
    margin-top: 0.2rem;
  }
  .results-bar-fill {
    background: var(--accent);
    height: 100%;
  }
  .result-row { font-size: 0.75rem; margin-top: 0.4rem; }
  .empty { color: var(--muted); font-size: 0.8rem; font-style: italic; }
</style>
</head>
<body>

<h1>Poll API — Test Client</h1>
<div class="sub">Manual testing interface for register / login / create / vote / results</div>

<div class="session-bar">
  <div>API base: <input id="apiBase" value="http://127.0.0.1:8000" style="width:220px; display:inline-block;"></div>
  <div id="sessionInfo">Not logged in</div>
</div>

<div class="grid">

  <div class="panel">
    <h2><span class="dot"></span>Register</h2>
    <label>Username</label>
    <input id="regUsername" placeholder="user_demo">
    <label>Email</label>
    <input id="regEmail" placeholder="user@example.com">
    <label>Password</label>
    <input id="regPassword" type="password" placeholder="at least 8 characters">
    <button onclick="register()">Create account</button>
    <div id="regStatus" class="status" style="display:none;"></div>
  </div>

  <div class="panel">
    <h2><span class="dot"></span>Log in</h2>
    <label>Username</label>
    <input id="loginUsername" placeholder="user_demo">
    <label>Password</label>
    <input id="loginPassword" type="password" placeholder="password">
    <button onclick="login()">Log in</button>
    <button class="ghost" onclick="logout()">Log out</button>
    <div id="loginStatus" class="status" style="display:none;"></div>
  </div>

  <div class="panel wide">
    <h2><span class="dot"></span>Create poll <span style="color:var(--muted); font-weight:normal;">(requires login)</span></h2>
    <label>Title</label>
    <input id="pollTitle" placeholder="Favorite season?">
    <label>Description</label>
    <input id="pollDescription" placeholder="optional">
    <label>Choices</label>
    <div id="choicesContainer">
      <div class="choice-row">
        <input class="choiceInput" placeholder="Choice 1">
        <button class="ghost small" onclick="removeChoice(this)">×</button>
      </div>
      <div class="choice-row">
        <input class="choiceInput" placeholder="Choice 2">
        <button class="ghost small" onclick="removeChoice(this)">×</button>
      </div>
    </div>
    <button class="ghost" onclick="addChoice()">+ add choice</button>
    <button onclick="createPoll()">Create poll</button>
    <div id="createStatus" class="status" style="display:none;"></div>
  </div>

  <div class="panel wide">
    <h2><span class="dot"></span>Polls</h2>
    <button class="ghost" onclick="loadPolls()">Refresh list</button>
    <div id="pollsContainer"></div>
  </div>

</div>

<script>
let accessToken = null;
let currentUsername = null;

function apiUrl(path) {
  return document.getElementById('apiBase').value.replace(/\/$/, '') + path;
}

function showStatus(elId, data, isError) {
  const el = document.getElementById(elId);
  el.style.display = 'block';
  el.className = 'status ' + (isError ? 'err' : 'ok');
  el.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
}

function updateSessionBar() {
  const el = document.getElementById('sessionInfo');
  el.innerHTML = accessToken
    ? `Logged in as <span class="user">${currentUsername}</span>`
    : 'Not logged in';
}

async function register() {
  const body = {
    username: document.getElementById('regUsername').value,
    email: document.getElementById('regEmail').value,
    password: document.getElementById('regPassword').value
  };
  try {
    const res = await fetch(apiUrl('/api/auth/register/'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    showStatus('regStatus', data, !res.ok);
  } catch (e) {
    showStatus('regStatus', 'Network error: ' + e.message, true);
  }
}

async function login() {
  const body = {
    username: document.getElementById('loginUsername').value,
    password: document.getElementById('loginPassword').value
  };
  try {
    const res = await fetch(apiUrl('/api/auth/token/'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    if (res.ok) {
      accessToken = data.access;
      currentUsername = body.username;
      updateSessionBar();
      showStatus('loginStatus', 'Logged in. Access token stored in memory.', false);
    } else {
      showStatus('loginStatus', data, true);
    }
  } catch (e) {
    showStatus('loginStatus', 'Network error: ' + e.message, true);
  }
}

function logout() {
  accessToken = null;
  currentUsername = null;
  updateSessionBar();
  showStatus('loginStatus', 'Logged out.', false);
}

function addChoice() {
  const container = document.getElementById('choicesContainer');
  const row = document.createElement('div');
  row.className = 'choice-row';
  row.innerHTML = `<input class="choiceInput" placeholder="Choice"><button class="ghost small" onclick="removeChoice(this)">×</button>`;
  container.appendChild(row);
}

function removeChoice(btn) {
  const rows = document.querySelectorAll('.choice-row');
  if (rows.length > 2) btn.parentElement.remove();
}

async function createPoll() {
  if (!accessToken) {
    showStatus('createStatus', 'You must log in first.', true);
    return;
  }
  const choices = Array.from(document.querySelectorAll('.choiceInput'))
    .map(i => i.value.trim())
    .filter(v => v.length > 0);

  const body = {
    title: document.getElementById('pollTitle').value,
    description: document.getElementById('pollDescription').value,
    choices: choices
  };

  try {
    const res = await fetch(apiUrl('/api/polls/'), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + accessToken
      },
      body: JSON.stringify(body)
    });
    const data = await res.json();
    showStatus('createStatus', data, !res.ok);
    if (res.ok) loadPolls();
  } catch (e) {
    showStatus('createStatus', 'Network error: ' + e.message, true);
  }
}

async function loadPolls() {
  const container = document.getElementById('pollsContainer');
  try {
    const res = await fetch(apiUrl('/api/polls/'));
    const data = await res.json();
    const polls = data.results || data;

    if (!polls.length) {
      container.innerHTML = '<div class="empty">No polls yet. Create one above.</div>';
      return;
    }

    container.innerHTML = '';
    polls.forEach(poll => {
      const card = document.createElement('div');
      card.className = 'poll-card';
      card.innerHTML = `
        <h3>${poll.title} ${!poll.is_open ? '<span class="closed-tag">(closed)</span>' : ''}</h3>
        <div class="meta">by ${poll.created_by} — ${poll.description || 'no description'}</div>
        <div class="choices-list">
          ${poll.choices.map(c => `<span class="choice-pill" onclick="vote(${poll.id}, ${c.id})">${c.text} (${c.vote_count})</span>`).join('')}
        </div>
        <div class="row">
          <button class="ghost small" onclick="viewResults(${poll.id}, this)">View results</button>
          <button class="ghost small" onclick="closePoll(${poll.id}, this)">Close poll</button>
        </div>
        <div class="resultsBox-${poll.id}"></div>
      `;
      container.appendChild(card);
    });
  } catch (e) {
    container.innerHTML = `<div class="status err">Network error: ${e.message}</div>`;
  }
}

async function vote(pollId, choiceId) {
  if (!accessToken) {
    alert('You must log in first.');
    return;
  }
  try {
    const res = await fetch(apiUrl(`/api/polls/${pollId}/vote/`), {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + accessToken
      },
      body: JSON.stringify({ choice_id: choiceId })
    });
    const data = await res.json();
    alert(res.ok ? 'Vote recorded.' : (data.detail || JSON.stringify(data)));
    loadPolls();
  } catch (e) {
    alert('Network error: ' + e.message);
  }
}

async function viewResults(pollId, btn) {
  const box = btn.parentElement.parentElement.querySelector(`.resultsBox-${pollId}`);
  try {
    const res = await fetch(apiUrl(`/api/polls/${pollId}/results/`));
    const data = await res.json();
    const total = data.results.reduce((sum, r) => sum + r.votes, 0) || 1;
    box.innerHTML = data.results.map(r => `
      <div class="result-row">
        ${r.choice}: ${r.votes} vote(s)
        <div class="results-bar-bg"><div class="results-bar-fill" style="width:${(r.votes / total) * 100}%"></div></div>
      </div>
    `).join('');
  } catch (e) {
    box.innerHTML = `<div class="status err">Network error: ${e.message}</div>`;
  }
}

async function closePoll(pollId, btn) {
  if (!accessToken) {
    alert('You must log in first.');
    return;
  }
  try {
    const res = await fetch(apiUrl(`/api/polls/${pollId}/close/`), {
      method: 'PATCH',
      headers: { 'Authorization': 'Bearer ' + accessToken }
    });
    const data = await res.json();
    alert(res.ok ? 'Poll closed.' : (data.detail || JSON.stringify(data)));
    loadPolls();
  } catch (e) {
    alert('Network error: ' + e.message);
  }
}

// initial load
loadPolls();
</script>

</body>
</html>
